<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Fundamentals | Interactive Learning</title>
    
    <!-- Tailwind CSS via CDN para prototipagem rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Estilos Customizados -->
    <link rel="stylesheet" href="src/css/style.css">
    
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        code, pre { font-family: 'Fira Code', monospace; }
        /* Garante que o editor ocupe o espaço correto */
        #editor-container { height: 100%; width: 100%; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen overflow-hidden flex flex-col">

    <!-- HEADER: Título e Status -->
    <header class="h-14 border-b border-slate-800 bg-slate-900 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white">Py</div>
            <h1 classs="text-lg font-bold tracking-tight text-white">Python <span class="text-blue-500">Fundamentals</span></h1>
        </div>
        <div id="status-badge" class="text-xs bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-slate-700">
            Iniciando...
        </div>
    </header>

    <!-- MAIN: Layout Split-View -->
    <main class="flex flex-1 overflow-hidden">
        
        <!-- PAINEL ESQUERDO: Teoria (Content) -->
        <section id="theory-panel" class="w-1/2 overflow-y-auto p-8 border-r border-slate-800 bg-slate-900">
            <div id="lesson-container">
                <h1 id="lesson-title" class="text-3xl font-bold mb-6 text-white">Carregando lição...</h1>
                <div id="lesson-content" class="prose prose-invert max-w-none text-slate-300 leading-relaxed">
                    <!-- O conteúdo do JSON entra aqui -->
                </div>
            </div>

            <!-- Navegação de Lições -->
            <div class="mt-12 pt-6 border-t border-slate-800 flex justify-between items-center">
                <button id="prev-btn" class="text-slate-400 hover:text-white disabled:opacity-20 transition-all flex items-center gap-1">
                    ← Anterior
                </button>
                <span id="lesson-counter" class="text-xs text-slate-500 font-mono uppercase tracking-widest">
                    Lição 0 de 0
                </span>
                <button id="next-btn" class="text-blue-400 hover:text-blue-300 disabled:opacity-20 transition-all flex items-center gap-1">
                    Próxima →
                </button>
            </div>
        </section>

        <!-- PAINEL DIREITO: Editor e Terminal -->
        <section class="w-1/2 flex flex-col bg-slate-950">
            
            <!-- Área do Editor (Monaco) -->
            <div class="flex-1 relative border-b border-slate-800">
                <div id="editor-container"></div>
                
                <!-- Botão de Execução flutuante sobre o editor -->
                <button id="run-button" disabled class="absolute bottom-4 right-6 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white px-6 py-2 rounded-md font-bold shadow-lg transition-all flex items-center gap-2 z-10">
                    <span>▶</span> Executar Código
                </button>
            </div>

            <!-- Terminal de Saída -->
            <div class="h-1/3 flex flex-col bg-black">
                <div class="bg-slate-900 px-4 py-1 text-xs font-bold text-slate-500 uppercase tracking-widest flex justify-between">
                    <span>Terminal</span>
                    <span class="text-blue-500/50">Python 3.x</span>
                </div>
                <div id="output" class="flex-1 p-4 font-mono text-sm overflow-y-auto text-green-400 whitespace-pre-wrap">
                    <span class="text-slate-600"># O resultado do seu código aparecerá aqui...</span>
                </div>
            </div>

        </section>
    </main>

    <!-- SCRIPTS: A ordem aqui é CRÍTICA -->
    
    <!-- 1. Loader do Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    
    <!-- 2. Pyodide (Motor Python) -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

    <!-- 3. Lógica do Projeto -->
    <script src="src/js/editor.js"></script>
    <script src="src/js/runner.js"></script>
    <script src="src/js/main.js"></script>

</body>
</html>
